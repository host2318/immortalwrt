name: Build NN6000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update

          sudo apt install -y build-essential clang flex bison gawk gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget python3

      - name: Update feeds
        run: |
          ./scripts/feeds update -a

      - name: Install feeds
        run: |
          ./scripts/feeds install -a

      - name: Check NSS source
        run: |
          echo "===== QCA NSS ====="

          find package -type d | grep qca-nss || true

          find package -type f | grep qca-nss || true


      - name: Verify feeds
        run: |
          echo "===== PASSWALL ====="
          find feeds -type d | grep passwall || true

          echo "===== EASYTIER ====="
          find feeds -type d | grep easytier || true

          echo "===== SINGBOX ====="
          find feeds -name "*sing*" || true

      - name: Load config
        run: |
          make defconfig

      - name: Show NSS config
        run: |
          grep NSS .config || true
          grep qca-nss .config || true

      - name: Verify NSS packages
        run: |
          grep -R "KernelPackage/qca-nss" package || true

          find package -type d | grep qca-nss || true

          find feeds -type d | grep qca-nss || true

      - name: Download sources
        run: |
          make download -j8

      - name: Build firmware
        run: |
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: NN6000-Firmware
          path: |
            bin/targets/**/*.bin
            bin/targets/**/*.itb
            bin/targets/**/*.ubi
            bin/targets/**/*.manifest
            bin/targets/**/*.buildinfo

name: Build NN6000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect config after checkout
        run: |
          pwd

          echo "===== FILES ====="
          ls -lah

          echo "===== CONFIG INFO ====="
          ls -lah .config || true

          echo "===== CONFIG FIRST 120 LINES ====="
          sed -n '1,120p' .config || true

          echo "===== PASSWALL ====="
          grep -n "passwall" .config || true

          echo "===== SINGBOX ====="
          grep -n "sing-box" .config || true

          echo "===== EASYTIER ====="
          grep -n "easytier" .config || true

      - name: Verify git branch
        run: |
          git branch
          git rev-parse HEAD
          git status

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget python3

      - name: Update feeds
        run: |
          set +e

          ./scripts/feeds update -a

          echo "===== INSTALL FEEDS ====="

          ./scripts/feeds install -a > feeds.log 2>&1

          RET=$?

          echo "INSTALL_RET=$RET"

          echo "===== LAST 200 LINES ====="
          tail -200 feeds.log

          exit $RET

      - name: Verify feeds
        run: |
          echo "===== PASSWALL ====="
          find feeds -type d | grep passwall || true

          echo "===== EASYTIER ====="
          find feeds -type d | grep easytier || true

          echo "===== SINGBOX ====="
          find feeds -name "*sing*" || true

          echo "===== XRAY ====="
          find feeds -name "*xray*" || true

          echo "===== PASSWALL DEPENDS ====="
          grep -R "DEPENDS" feeds/passwall2/luci-app-passwall2/Makefile || true

      - name: Cache dl
        uses: actions/cache@v4
        with:
          path: dl
          key: dl-v1-${{ runner.os }}

      - name: Load config
        run: |
          echo "===== BEFORE ====="
          grep passwall .config || true
          grep sing-box .config || true
          grep easytier .config || true

          make defconfig

          echo "===== AFTER ====="
          grep passwall .config || true
          grep sing-box .config || true
          grep easytier .config || true

      - name: Show selected packages
        run: |
          echo "===== PASSWALL ====="
          grep passwall .config || true

          echo "===== EASYTIER ====="
          grep easytier .config || true

          echo "===== SINGBOX ====="
          grep sing-box .config || true

          echo "===== XRAY ====="
          grep xray .config || true

      - name: Save final config
        run: |
          cp .config final.config

      - name: Upload final config
        uses: actions/upload-artifact@v4
        with:
          name: final-config
          path: final.config

      - name: Download sources
        run: |
          make download -j8

      - name: Build firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Show firmware files
        if: always()
        run: |
          find bin/targets -type f || true

      - name: Check manifest
        if: always()
        run: |
          echo "===== PASSWALL ====="
          grep passwall bin/targets/*/*/*.manifest || true

          echo "===== EASYTIER ====="
          grep easytier bin/targets/*/*/*.manifest || true

          echo "===== SINGBOX ====="
          grep sing-box bin/targets/*/*/*.manifest || true

          echo "===== XRAY ====="
          grep xray bin/targets/*/*/*.manifest || true

      - name: Upload firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            bin/targets/**/*
